name: Reusable release workflow

on:
  workflow_call:
    inputs:
      repository:
        description: 'Image repository'
        type: string
        required: false
        default: duynhlab/wolfi-images/${{ github.workflow }}
      tag:
        description: 'Image tag'
        type: string
        required: false
        default: 'latest'
      config-dir:
        description: 'Config directory'
        type: string
        required: false
        default: images/${{ github.workflow }}
      target:
        description: 'Image target'
        type: string
        required: false
        default: 'prod'
      packages:
        description: 'Additional packages'
        type: string
        required: false
        default: ''
      archs:
        description: 'Architectures'
        type: string
        required: false
        default: 'amd64,arm64'
      scan:
        description: 'Enable scan'
        type: string
        required: false
        default: 'true'

jobs:
  publish:
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
      packages: write
      security-events: write

    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
      registry: ${{ steps.vars.outputs.registry }}
      image: ${{ steps.vars.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v5

      - uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b #v0.7

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 #v4.1.2
        with:
          cosign-release: 'v2.5.3'

      - name: Set Vars
        id: vars
        shell: bash
        run: |
          export REGISTRY="ghcr.io"
          if [[ "${{ github.ref_name }}" != "main" ]]; then
            export REGISTRY="ttl.sh"
          fi
          echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT
          echo "image=${REGISTRY}/${{ inputs.repository }}:${{ inputs.tag }}" >> $GITHUB_OUTPUT

      - if: steps.vars.outputs.registry == 'ghcr.io'
        name: Login to GitHub Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create SBOM directory
        id: output
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/sbom

      - name: Publish image
        id: apko
        uses: distroless/actions/apko-publish@ff45c3434429aff735fdda0b5afbb57b14002be5 #v1.0.34
        with:
          config: ${{ inputs.config-dir }}/${{ inputs.target }}.yaml
          tag: ${{ steps.vars.outputs.image }}
          package-append: ${{ inputs.packages }}
          archs: ${{ inputs.archs }}
          sbom-path: ${{ github.workspace }}/sbom

      - id: digest
        shell: bash
        run: |
          echo "digest=$(crane digest ${{ steps.vars.outputs.image }})" >> $GITHUB_OUTPUT
          if [[ "${{ inputs.archs }}" == *"amd64"* ]]; then
              echo "digest-amd64=$(crane digest --platform=linux/amd64 ${{ steps.vars.outputs.image }})" >> $GITHUB_OUTPUT
          else
              echo "digest-amd64=''" >> $GITHUB_OUTPUT
          fi
          if [[ "${{ inputs.archs }}" == *"arm64"* ]]; then
              echo "digest-arm64=$(crane digest --platform=linux/arm64 ${{ steps.vars.outputs.image }})" >> $GITHUB_OUTPUT
          else
              echo "digest-arm64=''" >> $GITHUB_OUTPUT
          fi

      - name: Scan image for vulnerabilities
        if: inputs.scan == 'true'
        id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 #v7.4.0
        with:
          image: ${{ steps.vars.outputs.registry }}/${{ inputs.repository }}@${{ steps.digest.outputs.digest }}
          output-format: sarif
          fail-build: false
          severity-cutoff: critical

      - name: Upload scan results to code scanning
        if: inputs.scan == 'true' && steps.vars.outputs.registry == 'ghcr.io'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e #v4.36.2
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: ${{ github.workflow }}-${{ inputs.tag }}

      - name: Sign image
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign \
            --recursive \
            --oidc-provider=github-actions \
            ${{ steps.vars.outputs.registry }}/${{ inputs.repository }}@${{ steps.digest.outputs.digest }}

      - name: Attest index SBOM
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          cosign attest \
            --type=spdxjson \
            --predicate=${{ github.workspace }}/sbom/sbom-index.spdx.json \
            --oidc-provider=github-actions \
            ${{ steps.vars.outputs.registry }}/${{ inputs.repository }}@${{ steps.digest.outputs.digest }}

      - if: steps.digest.outputs.digest-amd64 != ''
        name: Attest amd64 SBOM
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          cosign attest \
            --type=spdxjson \
            --predicate=${{ github.workspace }}/sbom/sbom-x86_64.spdx.json \
            --oidc-provider=github-actions \
            ${{ steps.vars.outputs.registry }}/${{ inputs.repository }}@${{ steps.digest.outputs.digest-amd64 }}

      - if: steps.digest.outputs.digest-arm64 != ''
        name: Attest arm64 SBOM
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          cosign attest \
            --type=spdxjson \
            --predicate=${{ github.workspace }}/sbom/sbom-aarch64.spdx.json \
            --oidc-provider=github-actions \
            ${{ steps.vars.outputs.registry }}/${{ inputs.repository }}@${{ steps.digest.outputs.digest-arm64 }}

      - if: steps.vars.outputs.registry == 'ghcr.io'
        name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 #v4.1.1
        with:
          subject-name: ${{ steps.vars.outputs.registry }}/${{ inputs.repository }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
          # Storage records can only be created for org-owned repos; this is a
          # user-owned repo, so disable to avoid a "no artifacts found" warning.
          create-storage-record: false